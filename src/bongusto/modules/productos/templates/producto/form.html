{% extends "base.html" %}

{% block title %}{{ accion }} Producto{% endblock %}

{% block content %}
<!-- Titulo principal -->
<h4 class="titulo-seccion text-center mb-4">{{ accion }} Producto</h4>

<div class="card p-3">
  <!-- Si hay error se muestra aqui -->
  {% if error %}
  <div class="alert alert-danger">{{ error }}</div>
  {% endif %}
  <!-- Formulario para crear o actualizar producto -->
  <form
    action="{% if producto.id_producto %}/productos/{{ producto.id_producto }}/update{% else %}/productos/store{% endif %}"
    method="post"
    {% if not readonly %}
    data-confirm-title="{% if producto.id_producto %}Confirmar actualizacion{% else %}Confirmar creacion{% endif %}"
    data-confirm-text="{% if producto.id_producto %}Seguro que deseas guardar los cambios de este producto?{% else %}Seguro que deseas crear este producto?{% endif %}"
    data-confirm-button="{% if producto.id_producto %}Si, actualizar{% else %}Si, crear{% endif %}"
    {% endif %}
  >
    <!-- Token de seguridad -->
    {% csrf_token %}
    <!-- Campo nombre -->
    <div class="form-group">
      <label>Nombre</label>
      <input
        type="text"
        name="nombre_producto"
        maxlength="300"
        class="form-control"
        value="{{ producto.nombre_producto|default:'' }}"
        {% if readonly %}disabled{% else %}required{% endif %}
      >
    </div>
    <!-- Campo precio -->
    <div class="form-group">
      <label>Precio</label>
      <input
        type="number"
        step="0.01"
        min="0.01"
        name="precio_producto"
        class="form-control"
        value="{{ producto.precio_producto|default:'' }}"
        {% if readonly %}disabled{% else %}required{% endif %}
      >
    </div>
    <!-- Campo descripcion -->
    <div class="form-group">
      <label>Descripcion</label>
      <input
        type="text"
        name="descripcion_producto"
        maxlength="300"
        class="form-control"
        value="{{ producto.descripcion_producto|default:'' }}"
        {% if readonly %}disabled{% else %}required{% endif %}
      >
    </div>
    <!-- Seleccion de menu -->
    <div class="form-group">
      <label>Menu</label>
      <select name="id_menu" class="form-control" {% if readonly %}disabled{% else %}required{% endif %}>
        <option value="">Seleccionar menu...</option>
        {% for m in menus %}
        <option value="{{ m.id_menu }}" {% if producto.id_menu_id == m.id_menu %}selected{% endif %}>
          {{ m.nombre_menu }}
        </option>
        {% endfor %}
      </select>
    </div>
    <!-- Seleccion de categoria -->
    <div class="form-group">
      <label>Categoria</label>
      <select name="id_cate" class="form-control" {% if readonly %}disabled{% else %}required{% endif %}>
        <option value="">Seleccionar categoria...</option>
        {% for c in categorias %}
        <option value="{{ c.id_cate }}" {% if producto.id_cate_id == c.id_cate %}selected{% endif %}>
          {{ c.nombre_cate }}
        </option>
        {% endfor %}
      </select>
    </div>
    <!-- Estado del producto -->
    <div class="form-group">
      <label>Estado</label>
      <select name="estado" class="form-control" {% if readonly %}disabled{% else %}required{% endif %}>
        <option value="activo" {% if producto.estado == 'activo' %}selected{% endif %}>Activo</option>
        <option value="inactivo" {% if producto.estado == 'inactivo' %}selected{% endif %}>Inactivo</option>
      </select>
    </div>
    <!-- Botones -->
    <div class="d-flex justify-content-between mt-3">
      <!-- Volver o cancelar -->
      <a href="/productos" class="btn btn-secondary">
        {% if readonly %}Volver{% else %}Cancelar{% endif %}
      </a>
      <!-- Boton editar o guardar -->
      {% if readonly %}
      <a href="/productos/{{ producto.id_producto }}/edit" class="btn btn-success">Editar</a>
      {% else %}
      <button type="submit" class="btn btn-primary">Guardar</button>
      {% endif %}
    </div>
  </form>
</div>
{% endblock %}
