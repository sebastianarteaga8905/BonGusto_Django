<!-- Listado principal de categorias -->
<!-- Aquí se muestran todas las categorias con acciones -->

{% extends "base.html" %}
{% block title %}
Categorias
{% endblock %}
{% block content %}
<!-- Titulo principal -->
<h2 class="text-center mb-4">
  <strong>Categorias</strong>
</h2>
<!-- Boton para crear nueva categoria -->
<div class="d-flex justify-content-end mb-3">
  <a href="/categorias/create" class="btn btn-secondary">
    + Nueva Categoria
  </a>
</div>
<!-- Tabla principal -->
<div class="table-responsive">
  <table class="table table-hover">
    <!-- Encabezados -->
    <thead>
      <tr>
        <th class="id-cell">#</th>
        <th>Nombre</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <!-- Se recorren todas las categorias -->
      {% for c in categorias %}
      <tr>
        <!-- ID -->
        <td class="id-cell">
          <span class="id-value">{{ c.id_cate }}</span>
        </td>
        <!-- Nombre -->
        <td>{{ c.nombre_cate }}</td>
        <!-- Acciones -->
        <td>
          <!-- Contenedor de botones -->
          <div class="action-stack">
            <!-- Ver detalle -->
            <a href="/categorias/{{ c.id_cate }}" class="btn btn-view btn-sm">
              Ver
            </a>
            <!-- Editar -->
            <a href="/categorias/{{ c.id_cate }}/edit" class="btn btn-success btn-sm">
              Editar
            </a>
            <!-- Eliminar -->
            <!-- Va en form porque usa POST (seguridad) -->
            <form
              action="/categorias/{{ c.id_cate }}/delete"
              method="post"
              class="action-form"
              data-confirm-title="Confirmar eliminacion"
              data-confirm-text="Seguro que deseas eliminar esta categoria?"
              data-confirm-button="Si, eliminar"
            >
              {% csrf_token %}

              <button type="submit" class="btn btn-danger btn-sm">
                Eliminar
              </button>

            </form>

          </div>

        </td>
      </tr>
      <!-- Si no hay categorias -->
      {% empty %}
      <tr>
        <td colspan="3" class="text-center">
          Sin categorias
        </td>
      </tr>
      {% endfor %}
    </tbody>

  </table>
</div>

{% endblock %}
