<!-- Template que se muestra cuando el usuario cierra sesión -->
<!-- Muestra un mensaje visual y redirige automáticamente al login -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <!-- Redirección automática -->
  <!-- Espera 2 segundos y luego envía al login -->
  <meta http-equiv="refresh" content="2;url=/login">
  <!-- Responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Título -->
  <title>BonGusto | Cerrando sesión</title>
  <!-- Optimización carga de fuentes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Fuente principal -->
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* Reset básico */
    /* Evita inconsistencias entre navegadores */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    /* Body centrado */
    /* Centra todo el contenido vertical y horizontal */
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #f2f1f4;
      font-family: "Manrope", system-ui, sans-serif;
      color: #181818;
    }
    /* Contenedor principal */
    /* Card central con estilo moderno */
    .logout-shell {
      width: min(100%, 460px); /* Responsive automático */
      padding: 42px 36px;
      border-radius: 34px;
      /* Efecto tipo glass */
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.96);
      box-shadow: 0 24px 40px rgba(24, 24, 24, 0.08);
      text-align: center;
    }
    /* Logo */
    .logout-logo {
      width: 120px;
      height: 120px;
      display: block;
      margin: 0 auto 20px;
      object-fit: contain;
      object-position: center;
      border-radius: 28px;
    }
    /* Título */
    .logout-title {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      margin-bottom: 10px;
    }
    /* Texto descriptivo */
    .logout-copy {
      color: #73727a;
      font-size: 0.98rem;
      line-height: 1.6;
      margin-bottom: 18px;
    }
    /* Loader */
    /* Círculo que gira para dar sensación de carga */
    .logout-loader {
      width: 42px;
      height: 42px;
      margin: 0 auto;
      border-radius: 50%;
      /* Parte gris */
      border: 4px solid rgba(217, 4, 22, 0.14);

      /* Parte roja (la que gira) */
      border-top-color: #d90416;
      animation: spin 0.85s linear infinite;
    }
    /* Animación del loader */
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <!-- Card principal -->
  <div class="logout-shell">
    <!-- Logo -->
    <img 
      src="/static/img/logobongusto.png?v=20260322a" 
      alt="BonGusto" 
      class="logout-logo" 
      width="120" 
      height="120"
    >
    <!-- Título -->
    <h1 class="logout-title">Cerrando sesión</h1>
    <!-- Mensaje -->
    <p class="logout-copy">
      Serás redirigido al inicio de sesión en un momento.
    </p>
    <!-- Loader visual -->
    <div class="logout-loader" aria-hidden="true"></div>
  </div>
</body>
</html>
