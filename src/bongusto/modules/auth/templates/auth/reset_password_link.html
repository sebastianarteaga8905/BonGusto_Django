<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restablecer contraseña - BonGusto</title>
  <style>
    body { margin:0; font-family: Arial, Helvetica, sans-serif; background:#f6f4f1; color:#222; }
    .wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
    .card { width:100%; max-width:520px; background:#fff; border-radius:24px; box-shadow:0 18px 40px rgba(0,0,0,.08); overflow:hidden; }
    .head { padding:28px 32px; background:linear-gradient(135deg,#D62828 0%,#F77F00 100%); color:#fff; }
    .body { padding:28px 32px 34px; }
    .field { margin-bottom:16px; }
    label { display:block; font-size:14px; font-weight:700; margin-bottom:6px; color:#3a332f; }
    input { width:100%; box-sizing:border-box; border:1px solid #ddd; border-radius:14px; padding:14px 16px; font-size:15px; }
    button { width:100%; border:none; border-radius:999px; padding:15px 20px; background:#D62828; color:#fff; font-size:15px; font-weight:700; cursor:pointer; }
    .error { margin-bottom:16px; padding:14px 16px; border-radius:14px; background:#fdecea; color:#b42318; }
    .hint { margin-top:10px; font-size:13px; color:#6b625b; line-height:1.6; }
    .meta { margin-top:10px; font-size:13px; color:#6b625b; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="head">
        <div style="font-size:13px;letter-spacing:.16em;text-transform:uppercase;font-weight:700;opacity:.9;">BonGusto</div>
        <h1 style="margin:10px 0 0;font-size:30px;line-height:1.1;">Restablecer contraseña</h1>
      </div>
      <div class="body">
        {% if error %}
          <div class="error">{{ error }}</div>
        {% endif %}
        <form method="post">
          {% csrf_token %}
          <input type="hidden" name="token" value="{{ token }}">
          <div class="field">
            <label>Nueva contraseña</label>
            <input type="password" name="password" autocomplete="new-password" required>
          </div>
          <div class="field">
            <label>Confirmar contraseña</label>
            <input type="password" name="password_confirm" autocomplete="new-password" required>
          </div>
          <button type="submit">Guardar nueva contraseña</button>
        </form>
        <div class="hint">{{ password_policy_help }}</div>
        {% if email %}
          <div class="meta">Cuenta asociada: {{ email }}</div>
        {% endif %}
      </div>
    </div>
  </div>
</body>
</html>
